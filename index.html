<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ito</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

    <script src="themes.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>

<div id="app">

    <!-- トップ -->

    <section id="screen-top" class="screen active">

        <h1>ito</h1>

        <div id="player-list"></div>

        <div class="player-control-row">

            <button
                id="add-player-btn"
                class="secondary-btn small-btn">

                ＋

            </button>

            <button
                id="remove-player-btn"
                class="secondary-btn small-btn">

                －

            </button>

        </div>

        <p id="player-count">
            登録人数：0人
        </p>

        <button
            id="start-game-btn"
            class="primary-btn">

            ゲーム開始

        </button>

    </section>

    <!-- お題選択 -->

    <section id="screen-theme" class="screen">

        <h2>お題選択</h2>

        <div id="theme-options"></div>

        <div class="theme-separator"></div>

        <button
            id="custom-theme-btn"
            class="accent-btn">

            自由入力

        </button>

        <div class="theme-separator"></div>

        <button
            id="reroll-theme-btn"
            class="secondary-btn">

            ほかのお題で遊ぶ

        </button>

    </section>

    <!-- 自由入力 -->

    <section id="screen-custom-theme" class="screen">

        <h2>お題入力</h2>

        <input
            id="custom-theme-input"
            type="text"
            placeholder="お題を入力">

        <label class="checkbox-row">

            <input
                type="checkbox"
                id="save-custom-theme">

            次回以降も保存する

        </label>

        <button
            id="save-theme-btn"
            class="primary-btn">

            決定

        </button>

        <button
            id="cancel-theme-btn"
            class="secondary-btn">

            戻る

        </button>

    </section>

    <!-- 数字確認 -->

    <section id="screen-card-check" class="screen">

        <h2 id="current-player-name"></h2>

        <p>の番です</p>

        <button
            id="show-number-btn"
            class="primary-btn">

            数字を見る

        </button>

    </section>

    <!-- 数字表示 -->

    <section id="screen-card-show" class="screen">

        <h2 id="number-player-name"></h2>

        <div
            id="player-number"
            class="number-display">

            50

        </div>

        <button
            id="confirm-number-btn"
            class="primary-btn">

            確認しました

        </button>

    </section>

    <!-- 準備完了 -->

    <section id="screen-ready" class="screen">

        <h2>準備完了！</h2>

        <p>ゲームを開始します</p>

        <button
            id="begin-discussion-btn"
            class="primary-btn">

            ゲーム開始

        </button>

    </section>

    <!-- ゲーム中 -->

    <section id="screen-game" class="screen">

        <h2>お題</h2>

        <div
            id="current-theme-display"
            class="theme-display">

        </div>

        <button
            id="recheck-btn"
            class="primary-btn">

            番号を確認

        </button>

        <button
            id="result-input-btn"
            class="primary-btn">

            結果入力に進む

        </button>

        <button
            id="abort-btn"
            class="danger-btn">

            ゲーム中断

        </button>

    </section>

    <!-- 再確認 -->

    <section id="screen-recheck" class="screen">

        <h2>誰の数字を確認しますか？</h2>

        <div id="recheck-player-list"></div>

        <button
            id="back-to-game-btn"
            class="secondary-btn">

            戻る

        </button>

    </section>

    <!-- 並び替え -->

    <section id="screen-sort" class="screen">

        <h2>

            数字の大きい順に
            並べてください

        </h2>

        <p class="guide-text">

            上ほど大きい数字<br>
            下ほど小さい数字

        </p>

        <div id="sortable-list"></div>

        <button
            id="confirm-order-btn"
            class="primary-btn">

            確認画面へ

        </button>

    </section>

    <!-- 確認 -->

    <section id="screen-confirm-order" class="screen">

        <h2>

            結果発表を開始します

        </h2>

        <div id="order-preview"></div>

        <button
            id="finalize-order-btn"
            class="primary-btn">

            結果発表へ

        </button>

        <button
            id="back-to-sort-btn"
            class="secondary-btn">

            戻る

        </button>

    </section>

    <!-- 発表 -->

    <section id="screen-reveal" class="screen">

        <div
            id="reveal-player"
            class="reveal-player">

        </div>

        <div
            id="reveal-number"
            class="reveal-number">

        </div>

        <p class="reveal-guide">

            タップで次へ

        </p>

    </section>

    <!-- 結果 -->

    <section id="screen-result" class="screen">

        <h2>結果</h2>

        <div
            id="result-theme"
            class="result-theme">

        </div>

        <h3>回答</h3>

        <div
            id="predicted-result"
            class="result-box answer-box">

        </div>

        <h3>正解</h3>

        <div
            id="actual-result"
            class="result-box correct-box">

        </div>

        <button
            id="rematch-btn"
            class="primary-btn">

            同じメンバーで再戦

        </button>

        <button
            id="back-top-btn"
            class="secondary-btn">

            トップへ戻る

        </button>

    </section>

</div>

</body>
</html>
