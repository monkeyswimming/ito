<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ito</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

<div class="app">

    <!-- トップ -->

    <section id="screen-top" class="screen active">

        <h1>ito</h1>

        <div id="player-list"></div>

        <div class="player-buttons">
            <button id="add-player-btn">＋</button>
            <button id="remove-player-btn">－</button>
        </div>

        <p id="player-count">
            参加人数：0人
        </p>

        <button id="start-game-btn" class="primary">
            プレイ！
        </button>

    </section>

    <!-- お題選択 -->

    <section id="screen-theme" class="screen">

        <h2>お題を選んでください</h2>

        <div id="theme-options"></div>

        <div class="theme-actions">

            <button
                id="custom-theme-btn"
                class="secondary">

                自分でお題を入力

            </button>

            <button
                id="reroll-theme-btn"
                class="orange">

                ほかのお題で遊ぶ

            </button>

        </div>

    </section>

    <!-- カスタムお題 -->

    <section
        id="screen-custom-theme"
        class="screen">

        <h2>お題を入力</h2>

        <input
            id="custom-theme-input"
            type="text">

        <label class="checkbox">

            <input
                type="checkbox"
                id="save-custom-theme">

            保存する

        </label>

        <div class="button-group">

            <button id="save-theme-btn">
                決定
            </button>

            <button id="cancel-theme-btn">
                戻る
            </button>

        </div>

    </section>

    <!-- 数字確認前 -->

    <section
        id="screen-card-check"
        class="screen">

        <div class="center-card">

            <div
                id="current-player-name"
                class="player-name">
            </div>

            <div class="turn-text">
                の番です
            </div>

        </div>

    </section>

    <!-- 数字表示 -->

    <section
        id="screen-card-show"
        class="screen">

        <div class="center-card">

            <div
                id="number-player-name"
                class="player-name">
            </div>

            <div
                id="player-number"
                class="big-number">
            </div>

        </div>

    </section>

    <!-- 準備完了 -->

    <section
        id="screen-ready"
        class="screen">

        <div class="center-card">

            <h2>準備完了！</h2>

            <div class="ready-text">
                ゲームを開始します
            </div>

        </div>

    </section>

    <!-- ゲーム中 -->

    <section
        id="screen-game"
        class="screen">

        <h2>お題</h2>

        <div
            id="current-theme-display"
            class="theme-display">
        </div>

        <button
            id="result-input-btn"
            class="primary">

            回答

        </button>

        <button
            id="recheck-btn">

            番号を確認

        </button>

        <button
            id="abort-btn">

            ゲーム中断

        </button>

    </section>

    <!-- 再確認：プレイヤー選択 -->

    <section
        id="screen-recheck"
        class="screen">

        <h2>番号を確認</h2>

        <div
            id="recheck-player-list">
        </div>

    </section>

    <!-- 再確認：確認 -->

    <section
        id="screen-recheck-confirm"
        class="screen">

        <div class="center-card">

            <div
                id="recheck-confirm-name">
            </div>

            <p>
                の数字を表示しますか？
            </p>

        </div>

    </section>

    <!-- 再確認：数字表示 -->

    <section
        id="screen-recheck-number"
        class="screen">

        <div class="center-card">

            <div
                id="recheck-player-name"
                class="player-name">
            </div>

            <div
                id="recheck-player-number"
                class="big-number">
            </div>

        </div>

    </section>

    <!-- 回答入力 -->

    <section
        id="screen-sort"
        class="screen">

        <h2>
            数字の大きい順に並べ替えてください
        </h2>

        <div
            id="sortable-list">
        </div>

        <button
            id="confirm-order-btn"
            class="primary">

            回答を確認

        </button>

    </section>

    <!-- 回答確認 -->

    <section
        id="screen-confirm-order"
        class="screen">

        <h2>回答を確認</h2>

        <div id="order-preview"></div>

        <div class="button-group">

            <button
                id="finalize-order-btn"
                class="primary">

                結果発表へ

            </button>

            <button
                id="back-to-sort-btn">

                戻る

            </button>

        </div>

    </section>

    <!-- 発表 -->

    <section
        id="screen-reveal"
        class="screen">

        <div class="center-card">

            <div
                id="reveal-player"
                class="player-name">
            </div>

            <div
                id="reveal-number"
                class="big-number">
            </div>

            <div class="tap-next">
                タップで次へ
            </div>

        </div>

    </section>

    <!-- 結果 -->

    <section
        id="screen-result"
        class="screen">

        <h2>結果</h2>

        <div
            id="result-theme"
            class="theme-display">
        </div>

        <div class="result-block">

            <h3>回答</h3>

            <div
                id="predicted-result">
            </div>

        </div>

        <div class="result-block success">

            <h3>正解</h3>

            <div
                id="actual-result">
            </div>

        </div>

        <button
            id="rematch-btn"
            class="primary">

            もう一度プレイ

        </button>

        <button
            id="back-top-btn">

            トップへ戻る

        </button>

    </section>

</div>

<script src="themes.js"></script>
<script src="app.js"></script>

</body>
</html>
